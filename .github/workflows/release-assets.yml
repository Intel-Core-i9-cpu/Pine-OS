name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-assets:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate project scaffold
        if: matrix.os == 'ubuntu-latest'
        run: python app/pine_app.py new pine-release --target rpi5 --dir .

      - name: Build Linux artifacts (.deb + .img)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python app/pine_app.py package --config ./pine-release/pine.json --format deb --out ./dist
          python app/pine_app.py rpi5-image --config ./pine-release/pine.json --out ./dist
          mkdir -p release-assets
          cp dist/*.deb release-assets/
          cp dist/*.img release-assets/

      - name: Build Windows artifact (.exe)
        if: matrix.os == 'windows-latest'
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name pine-app app/pine_app.py

      - name: Stage Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/pine-app.exe release-assets/pine-app.exe

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: release-assets/*

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - build-assets
    steps:
      - name: Download all built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish files directly to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          ls -lah release-assets
          gh release upload "$TAG" release-assets/*.deb release-assets/*.img release-assets/*.exe --clobber
