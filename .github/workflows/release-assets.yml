name: Release Assets

on:
  release:

    types:
      - published



permissions:
  contents: write




jobs:
  build-linux-assets:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate project scaffold
        run: python app/pine_app.py new pine-release --target rpi5 --dir .


      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate project scaffold
        run: python app/pine_app.py new pine-release --target rpi5 --dir .

      - name: Build Linux release artifacts
        run: |
          python app/pine_app.py package --config ./pine-release/pine.json --format deb --out ./dist
          python app/pine_app.py rpi5-image --config ./pine-release/pine.json --out ./dist

      - name: Collect linux assets
        run: |
          mkdir -p release-assets
          cp dist/*.deb release-assets/
          cp dist/*.img release-assets/

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/*


  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

          python app/pine_app.py rpi5-bootkit --config ./pine-release/pine.json --out ./dist
          tar -czf dist/pine-release-rpi5-bootkit.tar.gz -C dist pine-release-0.1.0-rpi5-bootkit
      - name: Upload linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.img
            dist/*bootkit.tar.gz


  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --name pine-app app/pine_app.py

      - name: Stage windows asset

        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/pine-app.exe release-assets/pine-app.exe


        shell: bash
        run: |
          mkdir -p release-assets
          cp dist/pine-app.exe release-assets/pine-app.exe

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/*

  upload-to-release:
    runs-on: ubuntu-latest

    needs:
      - build-linux-assets
      - build-windows-exe

    needs: [build-linux-assets, build-windows-exe]

    steps:
      - name: Download all built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish files directly to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          ls -lah release-assets
          gh release upload "$TAG" release-assets/*.deb release-assets/*.img release-assets/*.exe --clobber


      - name: Upload windows artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pine-app.exe


